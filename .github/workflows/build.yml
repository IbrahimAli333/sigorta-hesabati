name: Build desktop apps

on:
  push:
    branches: [main]
  workflow_dispatch:   # lets you trigger a build manually from the Actions tab

jobs:
  windows:
    name: Build Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r build-requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller sigorta.spec --clean --noconfirm

      - name: Zip the result
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/Sigorta Hesabati/*" -DestinationPath "Sigorta-Hesabati-Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sigorta-Hesabati-Windows
          path: Sigorta-Hesabati-Windows.zip
          if-no-files-found: error
          retention-days: 30

  macos:
    name: Build macOS .app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r build-requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller sigorta.spec --clean --noconfirm

      - name: Zip the .app
        run: |
          cd dist
          zip -r ../Sigorta-Hesabati-macOS.zip "Sigorta Hesabati.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sigorta-Hesabati-macOS
          path: Sigorta-Hesabati-macOS.zip
          if-no-files-found: error
          retention-days: 30
