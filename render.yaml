services:
  - type: web
    name: sigorta-hesabati
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 -b 0.0.0.0:$PORT --timeout 180 --access-logfile - app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_PASSWORD
        sync: false   # Set this in the Render dashboard so it never lives in git.
